name: Release APK

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0.0, v2.0.0-rc1 等版本标签
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 2.0.0)'
        required: false
        default: '2.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Determine version
        id: get_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          VERSION_NAME: ${{ steps.get_version.outputs.VERSION }}
      
      - name: Build Release APK (without signing)
        run: ./gradlew assembleRelease
        env:
          VERSION_NAME: ${{ steps.get_version.outputs.VERSION }}
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## WJFakeLocation v${{ steps.get_version.outputs.VERSION }}
            
            ### 🎉 更新内容
            - 自动构建发布
            
            ### 📦 安装包
            - `app-debug.apk` - 调试版本（包含完整日志，可直接安装）
            - `app-release-unsigned.apk` - 未签名 Release 版本
            
            ### ⚠️ 注意事项
            - 建议直接使用 `app-debug.apk` 安装体验
            - Release 版本需要手动签名才能安装
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90
